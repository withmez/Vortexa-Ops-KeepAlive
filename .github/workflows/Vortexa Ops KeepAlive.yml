name: Vortexa 7-Day Activity KeepAlive

on:
  schedule:
    # 北京时间每 3 天的早上 09:30 准时运行一次
    - cron: '30 1 */3 * *'
  workflow_dispatch: # 依然支持手动点击随时测试

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install curl_cffi beautifulsoup4 pynacl

      - name: Run Vortexa Active Task
        env:
          VORTEXA_COOKIE: ${{ secrets.VORTEXA_COOKIE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python vortexa_keepalive.py
